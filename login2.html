<!DOCTYPE html>
<html>
<head>
    <title>login_page</title>

    <style type="text/css">
        #login_box {
            border:2px solid black;
            text-align:center;
            position:relative;
            top:100px;
            height:300px;
            width:300px;
            background-color:#afc2e0;
        }
        body {
            background-color:#081b3b;
        }
    </style>

    <script type="text/javascript">

        function setCookie(name, value) {
            document.cookie = name + "=" + value + ";path=/";
        }

        function getCookie(name) {
            var cookies = document.cookie.split(";");
            for (var i = 0; i < cookies.length; i++) {
                var c = cookies[i].trim();
                if (c.indexOf(name + "=") == 0) {
                    return c.substring(name.length + 1);
                }
            }
            return "";
        }

        function loadData() {
            var pname = getCookie("planet");
            if (pname != "") {
                document.getElementById("pname").value = pname;
            }
        }

        function validateForm() {

            var planetInput = document.getElementById("pname").value;

            if (planetInput.match(/^[A-Za-z]+$/)) {

                planetInput = planetInput.toLowerCase();

                setCookie("planet", planetInput);

                if (planetInput == "earth") {
                    window.location = "earth.html";
                }
                else if (planetInput == "mars") {
                    window.location = "mars.html";
                }
                else if (planetInput == "mercury") {
                    window.location = "mercury.html";
                }
                else if (planetInput == "jupiter") {
                    window.location = "jupiter.html";
                }
                else if (planetInput == "neptune") {
                    window.location = "neptune.html";
                }
                else if (planetInput == "venus") {
                    window.location = "venus.html";
                }
                else if (planetInput == "saturn") {
                    window.location = "saturn.html";
                }
                else {
                    alert("Invalid Planet Name");
                }

            } else {
                alert("Only letters allowed!");
            }

            return false;
        }

    </script>
</head>

<body onload="loadData()">

<center>
    <div id="login_box">
        <form onsubmit="return validateForm()">
            <u><h1>Planetary system</h1></u>

            <p style="font-weight:bolder;">
                <label>Planet Name:
                    <input type="text" id="pname" size="25" maxlength="30">
                </label>
            </p>

            <br>

            <p>
                <input type="submit" value="submit">
                <input type="reset" value="Clear">
            </p>

        </form>

        <br>
        <div><a href="summary.html">Summary of planets</a></div>
        <br>
        <div><a href="quiz.html">QUIZ</a></div>
    </div>
</center>

</body>
</html>
